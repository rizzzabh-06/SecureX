  suspicious_combinations:
    - permissions:
        - "android.permission.BIND_ACCESSIBILITY_SERVICE"
        - "android.permission.READ_SMS"
      threat: "Banking Trojan"
      severity: "CRITICAL"
      description: "Accessibility + SMS = classic banking trojan pattern"
    - permissions:
        - "android.permission.RECORD_AUDIO"
        - "android.permission.ACCESS_FINE_LOCATION"
        - "android.permission.READ_CONTACTS"
      threat: "Spyware/Stalkerware"
      severity: "CRITICAL"
      description: "Audio + Location + Contacts = comprehensive surveillance"
    - permissions:
        - "android.permission.INSTALL_PACKAGES"
        - "android.permission.INTERNET"
      threat: "Dropper"
      severity: "HIGH"
      description: "Network + Install = dropper downloading payloads"
    - permissions:
        - "android.permission.BIND_DEVICE_ADMIN"
        - "android.permission.WRITE_EXTERNAL_STORAGE"
      threat: "Ransomware"
      severity: "CRITICAL"
      description: "Device admin + storage write = ransomware"
