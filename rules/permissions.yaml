      score: 9
      category: "Data Theft"
      description: "Read SMS messages - used by banking trojans to steal OTPs"
    - permission: "android.permission.RECEIVE_SMS"
      score: 9
      category: "Data Theft"
      description: "Intercept incoming SMS - common in banking malware"
    - permission: "android.permission.SEND_SMS"
      score: 8
      category: "Fraud"
      description: "Send SMS - premium rate SMS fraud, spamming"
    - permission: "android.permission.READ_CALL_LOG"
      score: 8
      category: "Surveillance"
      description: "Read call history - spyware indicator"
    - permission: "android.permission.PROCESS_OUTGOING_CALLS"
      score: 8
